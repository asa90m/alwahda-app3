<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الوحده للبرمجيات - نظام صيانة الهواتف</title>
    <style>
        :root {
            --bg-primary: #f4f6f9;
            --bg-sidebar: #e9ecef;
            --text-main: #333333;
            --brand-color: #4a90e2;
            --brand-light: #e6f0fa;
            --gray-muted: #6c757d;
            --border-color: #ced4da;
            --success-color: #28a745;
            --danger-color: #dc3545;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-sidebar: #2d2d2d;
            --text-main: #f5f5f5;
            --brand-color: #377bbe;
            --brand-light: #2b3a4a;
            --gray-muted: #a0a0a0;
            --border-color: #444444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* شاشة الدخول المخصصة للجوال والكمبيوتر */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-card {
            background: var(--bg-sidebar);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 20px; color: var(--brand-color); }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-main);
            font-size: 16px; /* لمنع الزووم التلقائي المزعج في الآيفون */
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--brand-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        /* الشريط العلوي المرن */
        #main-header {
            background-color: var(--brand-light);
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; background: var(--brand-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .header-title { color: #2c5282; font-size: 1.1rem; font-weight: bold; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main); position: relative; padding: 5px; }
        .badge { position: absolute; top: -2px; right: -2px; background: var(--danger-color); color: white; font-size: 0.65rem; padding: 2px 5px; border-radius: 50%; }

        #app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* القائمة الجانبية المتوافقة مع لمس الجوال */
        #sidebar {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s ease;
        }
        
        /* تحسينات العرض لمتصفحات الموبايل */
        @media (max-width: 768px) {
            #sidebar {
                width: 60px;
            }
            .menu-text { display: none; }
            .section-title { font-size: 0.65rem; text-align: center; padding: 5px 2px; }
            .menu-item { justify-content: center; padding: 12px 5px; }
        }

        .sidebar-section { border-bottom: 1px solid var(--border-color); padding: 5px 0; }
        .section-title { padding: 5px 15px; font-weight: bold; color: var(--gray-muted); font-size: 0.85rem; background: rgba(0,0,0,0.03); }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; text-decoration: none; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background-color: var(--brand-light); color: var(--brand-color); font-weight: bold; }

        #content-area {
            flex: 1;
            padding: 1
